<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediterranean Meal Planner</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        textarea { font-family: inherit; }
        .chat-container { max-height: 500px; overflow-y: auto; }
        .message { animation: slideIn 0.3s ease-in; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBngk4ygPQ4KEPF_Edpgt8PEzt2mJI_-lo",
            authDomain: "meal-planner-bc0e3.firebaseapp.com",
            projectId: "meal-planner-bc0e3",
            storageBucket: "meal-planner-bc0e3.firebasestorage.app",
            messagingSenderId: "853585370924",
            appId: "1:853585370924:web:a29d946e12ce7100e95689",
            measurementId: "G-E8RTQ953BP",
            databaseURL: "https://meal-planner-bc0e3-default-rtdb.firebaseio.com"
        };

        let database;
        try {
            const app = initializeApp(firebaseConfig);
            database = getDatabase(app);
        } catch (error) {
            console.warn("Firebase init error:", error);
        }

        const { useState, useEffect, useRef } = React;

        function MealPlanner() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            
            const defaultMeals = {
                Sunday: {
                    lunch: { name: 'Mediterranean Quinoa Bowl', ingredients: ['Quinoa (1 cup)', 'Vegetable broth (2 cups)', 'Zucchini (2 medium)', 'Bell peppers', 'Cherry tomatoes', 'Cucumber', 'Olives', 'Feta cheese', 'Olive oil', 'Lemon'], notes: '1. Rinse quinoa and cook in vegetable broth for 15 minutes\n2. Grill zucchini and peppers until charred\n3. Toss with tomatoes, cucumber, olives\n4. Mix olive oil, lemon juice for dressing\n5. Combine all and serve with feta' },
                    dinner: { name: 'Miso bowls', ingredients: ['White miso paste (3 tbsp)', 'Short-grain rice (2 cups)', 'Tamari (2 tbsp)', 'Sesame oil (1 tbsp)', 'Frozen garlic', 'Kale', 'Avocado', 'Pickled onions', 'Pickled cabbage', 'Orange', 'Sesame seeds'], notes: '1. Cook rice according to package directions\n2. Blanch and sauté kale with frozen garlic and tamari\n3. Prepare miso broth by whisking miso, rice vinegar, and sesame oil\n4. Assemble bowls with rice, kale, avocado slices\n5. Add pickled vegetables and orange segments\n6. Pour warm miso broth over each bowl\n7. Top with sesame seeds and green onion' }
                },
                Monday: {
                    lunch: { name: 'Mediterranean White Bean & Kale Salad', ingredients: ['Cannellini beans (2 cans)', 'Kale (5 cups)', 'Red onion', 'Cherry tomatoes', 'Cucumber', 'Olives', 'Feta cheese', 'Red bell pepper', 'Olive oil', 'Red wine vinegar', 'Lemon juice', 'Garlic', 'Oregano'], notes: '1. Massage kale with olive oil and salt until softened\n2. Whisk together olive oil, vinegar, lemon juice, garlic, oregano for dressing\n3. Combine kale with drained beans, tomatoes, cucumber, peppers, red onion\n4. Pour dressing and toss well\n5. Let sit 10 minutes for flavors to meld\n6. Top with olives and feta cheese before serving' },
                    dinner: { name: 'Farro bowls with chicken', ingredients: ['Farro (2 cups)', 'Chicken breast (1.5 lbs)', 'Chicken broth (5 cups)', 'Greek yogurt (1 cup)', 'Kale (4 cups)', 'Pickled onions', 'Pickled cabbage', 'Dill (fresh)', 'Avocado', 'Frozen garlic', 'Sesame oil', 'Lemon'], notes: '1. Cook farro in chicken broth for 30-35 minutes until tender\n2. Season and pan-sear chicken 6-7 minutes per side until cooked through\n3. Sauté kale with frozen garlic until wilted\n4. Make sauce: mix Greek yogurt, lemon juice, dill, garlic\n5. Slice chicken and assemble bowls with farro, kale, chicken\n6. Top with pickled vegetables, avocado slices\n7. Drizzle with yogurt sauce and sesame oil' }
                },
                Tuesday: {
                    lunch: { name: 'Greek Salad with Chickpeas & Feta', ingredients: ['Romaine lettuce (1 head)', 'Chickpeas (2 cans)', 'Feta cheese (1 cup)', 'Tomatoes (3 large)', 'Cucumber (1)', 'Red onion', 'Kalamata olives', 'Olive oil', 'Lemon juice', 'Red wine vinegar', 'Oregano', 'Garlic'], notes: '1. Chop lettuce and place in large bowl\n2. Drain and pat chickpeas dry\n3. Add chickpeas, tomatoes, cucumber, red onion to lettuce\n4. Whisk olive oil, lemon juice, vinegar, garlic, oregano for dressing\n5. Toss salad with dressing\n6. Top with feta and olives\n7. Serve immediately before greens wilt' },
                    dinner: { name: 'Baked Mediterranean Sea Bass with Roasted Vegetables', ingredients: ['Sea bass fillets (4, 6-7 oz each)', 'Zucchini (2 medium)', 'Yellow bell pepper', 'Red bell pepper', 'Cherry tomatoes (2 cups)', 'Fresh rosemary', 'Fresh thyme', 'Garlic cloves', 'Olive oil', 'Lemon', 'Sea salt', 'Black pepper'], notes: '1. Preheat oven to 400°F\n2. Cut vegetables into bite-sized pieces\n3. Toss vegetables with garlic, olive oil, herbs, salt and pepper\n4. Spread on baking sheet and roast for 15 minutes\n5. Season fish fillets with salt, pepper, and lemon\n6. Nestle fish among vegetables\n7. Roast additional 12-15 minutes until fish flakes easily\n8. Serve with fresh lemon wedges' }
                },
                Wednesday: {
                    lunch: { name: 'Mediterranean Lentil Soup', ingredients: ['Brown lentils (2 cups)', 'Canned diced tomatoes', 'Vegetable broth (8 cups)', 'Celery (2 stalks)', 'Carrots (3 medium)', 'Onion (1 large)', 'Garlic (4 cloves)', 'Fresh spinach', 'Olive oil', 'Bay leaf', 'Oregano', 'Lemon juice'], notes: '1. Rinse lentils and set aside\n2. Heat olive oil and sauté onion, celery, carrots for 5-7 minutes\n3. Add garlic and cook 1 minute more\n4. Add broth, lentils, tomatoes, bay leaf, oregano\n5. Bring to boil then simmer 25-30 minutes until lentils are tender\n6. Add fresh spinach and stir until wilted\n7. Remove bay leaf and stir in lemon juice\n8. Season with salt and pepper, serve hot' },
                    dinner: { name: 'Grilled Lamb Kofta with Tabbouleh & Tahini', ingredients: ['Ground lamb (1.5 lbs)', 'Onion (minced)', 'Fresh parsley', 'Fresh mint', 'Garlic (minced)', 'Cumin', 'Coriander', 'Bulgur wheat', 'Tomatoes', 'Cucumber', 'Tahini', 'Lemon juice', 'Olive oil', 'Salt and pepper'], notes: '1. Mix lamb with minced onion, herbs, garlic, spices, salt and pepper\n2. Form onto skewers, pressing firmly\n3. Soak bulgur in hot water for 15 minutes\n4. Mix bulgur with diced tomatoes, cucumber, remaining herbs, lemon juice, olive oil\n5. For tahini sauce: mix tahini, lemon juice, garlic, water to desired consistency\n6. Grill kofta 10-12 minutes, turning occasionally until cooked through\n7. Serve kofta with tabbouleh and tahini sauce' }
                },
                Thursday: {
                    lunch: { name: 'Roasted Veggie Pita with Hummus', ingredients: ['Whole wheat pita (4)', 'Hummus (1 cup)', 'Zucchini', 'Eggplant', 'Red bell pepper', 'Red onion', 'Fresh spinach', 'Tomatoes', 'Cucumber', 'Feta cheese', 'Olive oil', 'Garlic', 'Dried herbs', 'Lemon juice'], notes: '1. Preheat oven to 400°F\n2. Cut vegetables into chunks\n3. Toss with garlic, olive oil, dried herbs, salt and pepper\n4. Roast for 20-25 minutes until golden and tender\n5. Warm pita bread\n6. Spread hummus inside each pita\n7. Layer roasted vegetables, fresh spinach, tomato, cucumber, feta\n8. Squeeze with fresh lemon juice and serve' },
                    dinner: { name: 'Whole Wheat Pasta with Tomato, Basil & Fish', ingredients: ['Whole wheat pasta (1 lb)', 'Cod or halibut fillets (1.5 lbs)', 'San Marzano tomatoes (2 cans)', 'Fresh basil', 'Garlic cloves', 'Red chili flakes', 'Olive oil', 'Lemon juice', 'Lemon zest', 'Salt and pepper', 'Pine nuts'], notes: '1. Cook pasta according to package directions, reserve pasta water\n2. Heat olive oil and sauté garlic and chili flakes for 30 seconds\n3. Add canned tomatoes and simmer 12-15 minutes\n4. Season fish with salt, pepper, lemon zest\n5. Slide fish into tomato sauce and cook 6-8 minutes until opaque\n6. Tear fresh basil into sauce\n7. Toss pasta with sauce and fish\n8. Top with pine nuts and serve with crusty bread' }
                },
                Friday: {
                    lunch: { name: 'Mediterranean Tuna Salad with White Beans', ingredients: ['Canned tuna (2 cans)', 'White beans (2 cans)', 'Cherry tomatoes', 'Red onion', 'Cucumber', 'Fresh parsley', 'Celery', 'Kalamata olives', 'Olive oil', 'Red wine vinegar', 'Lemon juice', 'Oregano', 'Garlic'], notes: '1. Drain tuna and break into chunks gently\n2. Rinse and drain white beans\n3. Combine tuna, beans, tomatoes, onion, cucumber, celery, parsley\n4. Whisk olive oil, vinegar, lemon juice, garlic, oregano for dressing\n5. Pour dressing over salad and fold gently\n6. Top with kalamata olives\n7. Serve on greens, bread, or as is\n8. Keeps up to 3 days in refrigerator' },
                    dinner: { name: 'Herb-Roasted Chicken Thighs with Root Vegetables', ingredients: ['Chicken thighs (8, bone-in skin-on)', 'Baby potatoes', 'Carrots', 'Parsnips', 'Fennel bulb', 'Red onion', 'Fresh rosemary', 'Fresh thyme', 'Fresh oregano', 'Garlic', 'Olive oil', 'Lemon zest', 'Salt and pepper'], notes: '1. Preheat oven to 425°F\n2. Pat chicken dry and season generously with salt and pepper\n3. Cut vegetables into similar-sized pieces\n4. Toss vegetables with garlic, olive oil, herbs, lemon zest, salt and pepper\n5. Spread vegetables on roasting pan\n6. Place chicken thighs skin-side up on top of vegetables\n7. Roast 35-40 minutes until skin is golden and chicken reaches 165°F\n8. Rest 5 minutes before serving' }
                },
                Saturday: {
                    lunch: { name: 'Shakshuka with Whole Grain Bread', ingredients: ['Eggs (6-8)', 'Canned diced tomatoes (2 cans)', 'Onion', 'Garlic', 'Red bell pepper', 'Fresh cilantro', 'Fresh parsley', 'Cumin', 'Paprika', 'Red chili flakes', 'Olive oil', 'Feta cheese', 'Whole grain bread'], notes: '1. Heat olive oil and sauté onion and bell pepper for 5-7 minutes\n2. Add garlic and cook 1 minute\n3. Add canned tomatoes, cumin, paprika, chili flakes, salt and pepper\n4. Simmer sauce 10-12 minutes until thickened\n5. Create wells in sauce and crack eggs into each\n6. Cover and cook 6-8 minutes until eggs are set\n7. Top with feta and fresh cilantro and parsley\n8. Serve with warm whole grain bread for dipping' },
                    dinner: { name: 'Seafood Paella with Saffron & Vegetables', ingredients: ['Shrimp (1 lb)', 'Mussels (1 lb)', 'Short-grain rice (2 cups)', 'Yellow onion', 'Garlic', 'Red bell pepper', 'Green peas', 'Seafood broth (5 cups)', 'Saffron threads', 'Dry white wine', 'Fresh lemon', 'Fresh parsley', 'Olive oil', 'Paprika', 'Salt and pepper'], notes: '1. Steep saffron in 1/4 cup hot water for 10 minutes\n2. Heat olive oil and sauté onion until softened\n3. Add garlic and rice, toast rice for 2 minutes\n4. Add white wine and stir until absorbed\n5. Begin adding broth one ladle at a time over 15-18 minutes\n6. After 10 minutes add bell pepper and paprika\n7. When rice is almost tender add saffron water\n8. Arrange shrimp and mussels on top\n9. Scatter peas and cook 5-7 minutes until seafood is done\n10. Top with fresh parsley and serve with lemon wedges' }
                }
            };

            const defaultIngredients = [
                { id: 1, text: 'Extra virgin olive oil (premium)' },
                { id: 2, text: 'Balsamic vinegar' },
                { id: 3, text: 'Red wine vinegar' },
                { id: 4, text: 'Sea salt' },
                { id: 5, text: 'Black pepper (fresh ground)' },
                { id: 6, text: 'Dried oregano' },
                { id: 7, text: 'Dried thyme' },
                { id: 8, text: 'Dried rosemary' },
                { id: 9, text: 'Paprika' },
                { id: 10, text: 'Red chili flakes' },
                { id: 11, text: 'Unsalted butter' },
                { id: 12, text: 'Greek yogurt for breakfast' },
                { id: 13, text: 'Berries' },
                { id: 14, text: 'Pistachios' }
            ];

            const [meals, setMeals] = useState(() => {
                const saved = localStorage.getItem('mealPlannerData');
                return saved ? JSON.parse(saved) : defaultMeals;
            });

            const [additionalIngredients, setAdditionalIngredients] = useState(() => {
                const saved = localStorage.getItem('additionalIngredients');
                return saved ? JSON.parse(saved) : defaultIngredients;
            });

            const [editMode, setEditMode] = useState(false);
            const [expandedMeal, setExpandedMeal] = useState(null);
            const [newIngredient, setNewIngredient] = useState('');
            const [showChat, setShowChat] = useState(false);
            const [chatMessages, setChatMessages] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const chatEndRef = useRef(null);

            // Save to localStorage
            useEffect(() => {
                localStorage.setItem('mealPlannerData', JSON.stringify(meals));
            }, [meals]);

            useEffect(() => {
                localStorage.setItem('additionalIngredients', JSON.stringify(additionalIngredients));
            }, [additionalIngredients]);

            // Sync to Firebase
            useEffect(() => {
                if (database) {
                    try {
                        set(ref(database, 'meals'), meals).catch(e => console.warn('Firebase sync error:', e));
                        set(ref(database, 'additionalIngredients'), additionalIngredients).catch(e => console.warn('Firebase sync error:', e));
                    } catch (error) {
                        console.warn('Firebase save error:', error);
                    }
                }
            }, [meals, additionalIngredients]);

            // Load from Firebase
            useEffect(() => {
                if (database) {
                    try {
                        onValue(ref(database, 'meals'), (snapshot) => {
                            if (snapshot.exists()) setMeals(snapshot.val());
                        });
                        onValue(ref(database, 'additionalIngredients'), (snapshot) => {
                            if (snapshot.exists()) setAdditionalIngredients(snapshot.val());
                        });
                    } catch (error) {
                        console.warn('Firebase load error:', error);
                    }
                }
            }, []);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages]);

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!userInput.trim()) return;

                const userMsg = userInput;
                setChatMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setUserInput('');
                setIsLoading(true);

                try {
                    const response = await fetch('/api/updateMeal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            request: userMsg,
                            currentMeals: meals
                        })
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        setChatMessages(prev => [...prev, { role: 'assistant', content: `❌ Error: ${error.error}. Make sure your Vercel function has CLAUDE_API_KEY set in environment variables.` }]);
                        setIsLoading(false);
                        return;
                    }

                    const data = await response.json();
                    if (data.success) {
                        setMeals(data.meals);
                        setChatMessages(prev => [...prev, { role: 'assistant', content: '✅ Meals updated! Your changes are now live.' }]);
                    } else {
                        setChatMessages(prev => [...prev, { role: 'assistant', content: `❌ ${data.error}` }]);
                    }
                } catch (error) {
                    setChatMessages(prev => [...prev, { role: 'assistant', content: `❌ Error: ${error.message}` }]);
                }
                setIsLoading(false);
            };

            const handleMealChange = (day, mealType, field, value) => {
                setMeals(prev => ({
                    ...prev,
                    [day]: { ...prev[day], [mealType]: { ...prev[day][mealType], [field]: value } }
                }));
            };

            const handleIngredientChange = (day, mealType, idx, value) => {
                const newIngredients = [...meals[day][mealType].ingredients];
                newIngredients[idx] = value;
                handleMealChange(day, mealType, 'ingredients', newIngredients);
            };

            const addIngredientToMeal = (day, mealType) => {
                handleMealChange(day, mealType, 'ingredients', [...meals[day][mealType].ingredients, '']);
            };

            const removeIngredientFromMeal = (day, mealType, idx) => {
                const newIngredients = meals[day][mealType].ingredients.filter((_, i) => i !== idx);
                handleMealChange(day, mealType, 'ingredients', newIngredients);
            };

            const addAdditionalIngredient = () => {
                if (newIngredient.trim()) {
                    setAdditionalIngredients(prev => [...prev, { id: Date.now(), text: newIngredient }]);
                    setNewIngredient('');
                }
            };

            const deleteAdditionalIngredient = (id) => {
                setAdditionalIngredients(prev => prev.filter(item => item.id !== id));
            };

            const resetToDefaults = () => {
                if (confirm('Reset all meals to defaults?')) {
                    setMeals(defaultMeals);
                }
            };

            const generateGroceryList = () => {
                const allIngredients = {};
                Object.values(meals).forEach(day => {
                    Object.values(day).forEach(meal => {
                        meal.ingredients.forEach(ing => {
                            if (ing.trim()) allIngredients[ing] = (allIngredients[ing] || 0) + 1;
                        });
                    });
                });
                additionalIngredients.forEach(ing => {
                    allIngredients[ing.text] = (allIngredients[ing.text] || 0) + 1;
                });
                return Object.entries(allIngredients).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
            };

            const groceryList = generateGroceryList();

            return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-green-50 to-blue-50 p-6' },
                React.createElement('div', { className: 'max-w-6xl mx-auto' },
                    // Header
                    React.createElement('div', { className: 'mb-8 flex items-center justify-between flex-wrap gap-4' },
                        React.createElement('div', null,
                            React.createElement('h1', { className: 'text-4xl font-bold text-gray-800 mb-2' }, '🌍 Mediterranean Meal Planner'),
                            React.createElement('p', { className: 'text-gray-600 text-sm' }, 'Ask Claude to change any meal, or edit manually')
                        ),
                        React.createElement('div', { className: 'flex gap-2 flex-wrap' },
                            React.createElement('button', {
                                onClick: () => setShowChat(!showChat),
                                className: 'bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 text-sm font-bold'
                            }, '💬 Ask Claude'),
                            React.createElement('button', {
                                onClick: () => setEditMode(!editMode),
                                className: editMode ? 'bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 text-sm font-bold' : 'bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 text-sm font-bold'
                            }, editMode ? '✓ Done Editing' : '✏️ Edit Mode'),
                            editMode && React.createElement('button', {
                                onClick: resetToDefaults,
                                className: 'bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 text-sm font-bold'
                            }, '↺ Reset')
                        )
                    ),

                    // Chat Modal
                    showChat && React.createElement('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-end z-50' },
                        React.createElement('div', { className: 'bg-white w-full md:w-96 rounded-t-lg md:rounded-lg shadow-lg md:m-4 flex flex-col max-h-96 md:max-h-screen' },
                            React.createElement('div', { className: 'p-4 border-b border-gray-200 flex justify-between items-center' },
                                React.createElement('h3', { className: 'font-bold text-lg' }, '💬 Ask Claude to Update Meals'),
                                React.createElement('button', {
                                    onClick: () => setShowChat(false),
                                    className: 'text-gray-500 hover:text-gray-700 text-2xl'
                                }, '✕')
                            ),
                            React.createElement('div', { className: 'chat-container p-4 space-y-3 flex-1' },
                                React.createElement('div', { className: 'bg-blue-50 p-3 rounded text-sm text-blue-900' },
                                    '💡 Examples: "Replace Tuesday lunch with a Mediterranean pasta salad" or "Change Friday dinner to grilled fish with lemon sauce"'
                                ),
                                chatMessages.map((msg, idx) =>
                                    React.createElement('div', { key: idx, className: `message ${msg.role === 'user' ? 'text-right' : 'text-left'}` },
                                        React.createElement('div', { className: `inline-block max-w-xs px-3 py-2 rounded-lg ${msg.role === 'user' ? 'bg-purple-500 text-white' : 'bg-gray-200 text-gray-800'}` },
                                            msg.content
                                        )
                                    )
                                ),
                                isLoading && React.createElement('div', { className: 'text-center text-gray-500 text-sm' }, '🔄 Claude is thinking...'),
                                React.createElement('div', { ref: chatEndRef })
                            ),
                            React.createElement('form', { onSubmit: handleSendMessage, className: 'p-4 border-t border-gray-200' },
                                React.createElement('div', { className: 'flex gap-2' },
                                    React.createElement('input', {
                                        type: 'text',
                                        value: userInput,
                                        onChange: (e) => setUserInput(e.target.value),
                                        placeholder: 'Describe the meal change...',
                                        disabled: isLoading,
                                        className: 'flex-1 border border-gray-300 rounded px-3 py-2 text-sm disabled:bg-gray-100'
                                    }),
                                    React.createElement('button', {
                                        type: 'submit',
                                        disabled: isLoading || !userInput.trim(),
                                        className: 'bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600 disabled:bg-gray-400 text-sm font-bold'
                                    }, '📤')
                                )
                            )
                        )
                    ),

                    // Meals Section
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-lg p-6 mb-8' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-6' }, 'Meal Schedule'),
                        React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-4' },
                            days.map(day =>
                                React.createElement('div', { key: day, className: 'border border-gray-200 rounded-lg p-4' },
                                    React.createElement('h3', { className: 'font-bold text-lg text-gray-800 mb-4 pb-2 border-b border-gray-200' }, day),
                                    ['lunch', 'dinner'].map(mealType => {
                                        const meal = meals[day][mealType];
                                        const mealKey = `${day}-${mealType}`;
                                        const isExpanded = expandedMeal === mealKey;

                                        return React.createElement('div', { key: mealType, className: 'mb-4' },
                                            React.createElement('div', {
                                                onClick: () => setExpandedMeal(isExpanded ? null : mealKey),
                                                className: 'bg-blue-50 rounded p-3 cursor-pointer hover:bg-blue-100 flex items-center justify-between border border-blue-200'
                                            },
                                                React.createElement('span', { className: 'text-sm font-medium text-gray-700 flex-1' }, meal.name || '(Empty)'),
                                                React.createElement('span', { className: 'text-gray-500 ml-2' }, isExpanded ? '▲' : '▼')
                                            ),
                                            isExpanded && React.createElement('div', { className: 'bg-gray-50 rounded-b-lg p-4 border border-t-0 border-blue-200 space-y-3' },
                                                React.createElement('div', null,
                                                    React.createElement('label', { className: 'text-xs font-semibold text-gray-600 block mb-1' }, 'Meal Name'),
                                                    editMode ? 
                                                        React.createElement('input', {
                                                            type: 'text',
                                                            value: meal.name,
                                                            onChange: (e) => handleMealChange(day, mealType, 'name', e.target.value),
                                                            className: 'w-full border border-gray-300 rounded px-3 py-2 text-sm'
                                                        }) :
                                                        React.createElement('p', { className: 'text-sm text-gray-700' }, meal.name)
                                                ),

                                                React.createElement('div', null,
                                                    React.createElement('label', { className: 'text-xs font-semibold text-gray-600 block mb-2' }, 'Ingredients'),
                                                    editMode ?
                                                        React.createElement('div', { className: 'space-y-2 mb-2' },
                                                            meal.ingredients.map((ing, idx) =>
                                                                React.createElement('div', { key: idx, className: 'flex gap-2' },
                                                                    React.createElement('input', {
                                                                        type: 'text',
                                                                        value: ing,
                                                                        onChange: (e) => handleIngredientChange(day, mealType, idx, e.target.value),
                                                                        placeholder: 'Ingredient',
                                                                        className: 'flex-1 border border-gray-300 rounded px-2 py-1 text-xs'
                                                                    }),
                                                                    React.createElement('button', {
                                                                        onClick: () => removeIngredientFromMeal(day, mealType, idx),
                                                                        className: 'bg-red-500 text-white px-2 py-1 rounded text-xs hover:bg-red-600'
                                                                    }, '✕')
                                                                )
                                                            ),
                                                            React.createElement('button', {
                                                                onClick: () => addIngredientToMeal(day, mealType),
                                                                className: 'bg-green-500 text-white px-3 py-1 rounded text-xs hover:bg-green-600 w-full'
                                                            }, '+ Add Ingredient')
                                                        ) :
                                                        React.createElement('div', { className: 'space-y-1 max-h-24 overflow-y-auto' },
                                                            meal.ingredients.map((ing, idx) =>
                                                                React.createElement('div', { key: idx, className: 'bg-white p-2 rounded border border-gray-200 text-xs text-gray-700' },
                                                                    '• ' + ing
                                                                )
                                                            )
                                                        )
                                                ),

                                                React.createElement('div', null,
                                                    React.createElement('label', { className: 'text-xs font-semibold text-gray-600 block mb-1' }, 'Step-by-Step Recipe'),
                                                    editMode ?
                                                        React.createElement('textarea', {
                                                            value: meal.notes,
                                                            onChange: (e) => handleMealChange(day, mealType, 'notes', e.target.value),
                                                            className: 'w-full border border-gray-300 rounded px-3 py-2 text-xs min-h-[120px]',
                                                            placeholder: 'Enter numbered steps...'
                                                        }) :
                                                        React.createElement('div', { className: 'bg-white p-3 rounded border border-gray-200 text-xs text-gray-700 whitespace-pre-wrap max-h-32 overflow-y-auto' },
                                                            meal.notes
                                                        )
                                                )
                                            )
                                        );
                                    })
                                )
                            )
                        )
                    ),

                    // Pantry Staples
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-lg p-6 mb-8' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-4' }, 'Pantry Staples'),
                        editMode && React.createElement('div', { className: 'flex gap-2 mb-4' },
                            React.createElement('input', {
                                type: 'text',
                                value: newIngredient,
                                onChange: (e) => setNewIngredient(e.target.value),
                                onKeyPress: (e) => e.key === 'Enter' && addAdditionalIngredient(),
                                placeholder: 'Add new staple...',
                                className: 'flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm'
                            }),
                            React.createElement('button', {
                                onClick: addAdditionalIngredient,
                                className: 'bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600 text-sm'
                            }, '+ Add')
                        ),
                        React.createElement('div', { className: 'space-y-2' },
                            additionalIngredients.map(item =>
                                React.createElement('div', { key: item.id, className: 'flex items-center justify-between bg-gray-50 p-3 rounded-lg hover:bg-gray-100' },
                                    React.createElement('span', { className: 'text-sm text-gray-700 flex-1' }, item.text),
                                    editMode && React.createElement('button', {
                                        onClick: () => deleteAdditionalIngredient(item.id),
                                        className: 'text-red-500 hover:text-red-700 text-sm font-bold'
                                    }, '✕')
                                )
                            )
                        )
                    ),

                    // Shopping List
                    React.createElement('div', { className: 'bg-white rounded-lg shadow-lg p-6' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-gray-800 mb-4' }, 'Shopping List'),
                        React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-3' },
                            groceryList.map((item, idx) =>
                                React.createElement('div', { key: idx, className: 'flex items-center justify-between bg-gradient-to-r from-green-50 to-blue-50 p-3 rounded-lg border border-green-200' },
                                    React.createElement('div', { className: 'flex-1' },
                                        React.createElement('span', { className: 'text-sm font-medium text-gray-800' }, item.name),
                                        item.count > 1 && React.createElement('span', { className: 'ml-2 text-xs bg-green-200 text-green-800 px-2 py-1 rounded-full' }, item.count + 'x')
                                    ),
                                    React.createElement('input', {
                                        type: 'checkbox',
                                        className: 'w-4 h-4 cursor-pointer flex-shrink-0 ml-2'
                                    })
                                )
                            )
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(MealPlanner));
    </script>
</body>
</html>
